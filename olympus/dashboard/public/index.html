  <body>
    <noscript>You need to enable JavaScript to run OLYMPUS OS.</noscript>
    <div id="root"></div>

    <script>
      const originalError = console.error;
      console.error = function(...args) {
        const errorString = args.join(' ');
        if (errorString.includes('recentlyCreatedOwnerStacks') ||
            errorString.includes('resium.js')) {
          return;
        }
        originalError.apply(console, args);
      };
    </script>
