# Enable OpenThread
CONFIG_OPENTHREAD=y

# nRF board library
CONFIG_DK_LIBRARY=y

# Enable OpenThread CoAP support API
CONFIG_OPENTHREAD_COAP=y

# --- Shell / console / logs on RTT, OFF the USB data channel -----------------
# The Jetson data link owns the USB CDC ACM port and must carry ONLY newline-
# delimited JSON, so every human/diagnostic stream is moved to SEGGER RTT.
# (Viewing the shell/logs requires an SWD probe — chosen per project decision.)
CONFIG_SHELL=y
CONFIG_OPENTHREAD_SHELL=y
CONFIG_SHELL_ARGC_MAX=26
CONFIG_SHELL_CMD_BUFF_SIZE=416
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y

# Logs + printk ride the RTT shell (CONFIG_SHELL_LOG_BACKEND), so the USB data
# port never sees console/log text. No separate UART/RTT log backend or UART
# console — those would either pollute the data port or clash on RTT channel 0.
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

# --- USB CDC ACM upstream data link to the Jetson Orin Nano ------------------
# The nRF is the USB device; the Jetson is the host. The board's native config
# (boards/common/usb/cdc_acm_serial.dtsi + defconfig) already selects the modern
# USB device_next stack and registers + enables the single CDC ACM instance
# (board_cdc_acm_uart) at boot, so we do NOT re-enable USB ourselves — we just
# make the stack/class explicit and turn on line control for DTR detection.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="nRF Swarm Data"

# --- node identity for the capability manifest ------------------------------
CONFIG_HWINFO=y

# --- hardware UART for the NMEA GPS (uart0 @ D6/D7, see board overlay) -------
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y

# --- float formatting for the JSON lat/lon/alt fields -----------------------
CONFIG_CBPRINTF_FP_SUPPORT=y

# Increase Settings storage size
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000

# Same network Master Key for client and server
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"

CONFIG_MBEDTLS_SHA1_C=n
CONFIG_FPU=y

# Increase main stack size to meet networking requirements
CONFIG_MAIN_STACK_SIZE=4096
