#
# Command-station gateway overlay.
#
# Flash this build onto the nRF wired to the Olympus host. It joins the same
# Thread mesh, hears every module's realm-local multicast, forwards it out the
# serial data link to olympus_link, and injects route/cmd downlink from the host
# back into the mesh. It does not announce itself as a swarm member.
#
#   west build -b xiao_ble . -- -DEXTRA_CONF_FILE=overlay-gateway.conf
#
# SPDX-License-Identifier: LicenseRef-Nordic-5-Clause
#

CONFIG_SWARM_GATEWAY=y
CONFIG_SWARM_NODE_NAME="gateway"
CONFIG_SWARM_ROLE_PROVIDER=n
CONFIG_SWARM_ROLE_CONSUMER=n
CONFIG_SWARM_ROLE_RELAY=y
