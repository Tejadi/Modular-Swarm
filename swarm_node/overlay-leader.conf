# Base-station leader build.
#
#   ./build.sh --leader
#
# The leader bridges the mesh to the Olympus host (like the gateway) AND carries
# its own GPS/IMU so it appears as a fleet position anchor, AND may broadcast
# override commands. It is infrastructure, not an overridable vehicle.

CONFIG_SWARM_GATEWAY=y
CONFIG_SWARM_LEADER=y

CONFIG_SWARM_NODE_NAME="leader"
CONFIG_SWARM_MOUNT_VEHICLE=n
CONFIG_SWARM_CAP_OVERRIDABLE=n
CONFIG_SWARM_CAP_AUTONOMOUS=n
CONFIG_SWARM_CAP_PASSIVE_RX=n
CONFIG_SWARM_FORWARD_PEERS=n
