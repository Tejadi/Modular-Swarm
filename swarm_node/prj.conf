#
# Reconfigurable swarm module — base configuration (plain node).
#
# For the command-station gateway, add the overlay:
#   west build -b xiao_ble . -- -DEXTRA_CONF_FILE=overlay-gateway.conf
#
# SPDX-License-Identifier: LicenseRef-Nordic-5-Clause
#

# --- OpenThread mesh (same network as the original coap samples) ---
CONFIG_OPENTHREAD=y
CONFIG_OPENTHREAD_COAP=y
CONFIG_OPENTHREAD_FTD=y
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y

# --- Shell / console / logs on SEGGER RTT, OFF the USB data channel ---
# The single USB CDC ACM port is the swarm data link (binary frames), so the ot
# shell + console + logs move to RTT (view with an SWD probe). This mirrors the
# proven coap_server config on this NCS; the board's USB device_next stack
# auto-enables the CDC at boot, so the firmware never calls usb_enable() itself.
CONFIG_SHELL=y
CONFIG_OPENTHREAD_SHELL=y
CONFIG_SHELL_ARGC_MAX=26
CONFIG_SHELL_CMD_BUFF_SIZE=416
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

# --- nRF board library (LEDs / buttons) ---
CONFIG_DK_LIBRARY=y

# --- modular sensor stack (probed at boot; absent parts degrade gracefully) ---
# The IMU is auto-detected at runtime (sensors.c): an MPU-6050 (via the Zephyr
# driver below, 0x68) OR a BNO055 (0x28, read by src/bno055.c over direct I2C —
# NCS ships no BNO055 driver). Both can stay wired; the firmware uses whichever
# answers. Keep CONFIG_MPU6050 for the MPU path; the BNO055 needs only CONFIG_I2C.
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_MPU6050=y          # Adafruit MPU-6050 6-DoF IMU (invensense,mpu6050 @ 0x68)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- USB-CDC data link to the Jetson / Olympus host (board_cdc_acm_uart) ---
# The board's defconfig selects the modern USB device_next stack and enables the
# single CDC ACM instance at boot; we just make the class explicit + line control.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="Olympus Swarm Node"
CONFIG_RING_BUFFER=y

# --- runtime knobs used by the cmd channel ---
CONFIG_REBOOT=y

# --- floating point for ranging / dead-reckoning math + log formatting ---
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- stacks / storage sized for networking ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000
CONFIG_MBEDTLS_SHA1_C=n

# --- give the host 5 s to enumerate the USB CDC port after reset ---
CONFIG_BOOT_DELAY=5000
